<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hearth — Family Command Center</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource-variable/mona-sans/index.css">
<style>
  :root{
    /* Impactable brand — green-skewed */
    --teal:#00C4B3;        /* brand teal (lead accent) */
    --green:#3DD68C;        /* spring green */
    --yellow:#FFD166;
    --orange:#F4A261;
    --sage:#5FB3A1;
    --lime:#9CCB5A;
    --mint:#7FE0C4;
    --navy:#1A3B6D;

    --bg:#08130F;
    --bg2:#0A1A15;
    --surface:rgba(255,255,255,.045);
    --surface-2:rgba(255,255,255,.065);
    --glass:rgba(13,38,32,.55);
    --line:rgba(0,196,179,.16);
    --line-soft:rgba(255,255,255,.07);
    --ink:#EAF4F0;
    --ink-soft:#A7C2BA;
    --muted:#6E8A82;
    --font:'Mona Sans Variable','Mona Sans','Helvetica Neue',Helvetica,Arial,sans-serif;
    --shadow:0 1px 2px rgba(0,0,0,.3),0 18px 50px rgba(0,0,0,.40);
    --glow:0 0 0 1px rgba(0,196,179,.20),0 12px 40px rgba(0,196,179,.12);
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%}
  body{
    font-family:var(--font);background:var(--bg);color:var(--ink);
    -webkit-font-smoothing:antialiased;display:flex;min-height:100vh;overflow-x:hidden;
    font-weight:450;
  }
  /* atmospheric green/teal mesh */
  body::before{
    content:"";position:fixed;inset:0;z-index:0;pointer-events:none;
    background:
      radial-gradient(60% 50% at 12% 0%,rgba(0,196,179,.16),transparent 60%),
      radial-gradient(45% 45% at 95% 12%,rgba(61,214,140,.12),transparent 60%),
      radial-gradient(60% 60% at 75% 100%,rgba(0,196,179,.07),transparent 60%),
      linear-gradient(180deg,var(--bg),var(--bg2));
  }
  body::after{
    content:"";position:fixed;inset:0;z-index:0;pointer-events:none;opacity:.4;
    background-image:radial-gradient(rgba(255,255,255,.04) 1px,transparent 1px);background-size:3px 3px;
  }

  /* ---------- SIDEBAR ---------- */
  .sidebar{
    width:268px;flex:0 0 268px;position:sticky;top:0;height:100vh;z-index:3;
    background:linear-gradient(180deg,rgba(10,26,21,.9),rgba(8,19,15,.92));
    border-right:1px solid var(--line-soft);backdrop-filter:blur(14px);
    display:flex;flex-direction:column;padding:24px 16px 16px;
  }
  .brand{display:flex;align-items:center;gap:12px;padding:4px 8px 24px}
  .brand .mark{
    width:40px;height:40px;border-radius:12px;flex:0 0 40px;
    background:linear-gradient(150deg,var(--teal),#067e72);
    display:flex;align-items:center;justify-content:center;
    box-shadow:0 8px 22px rgba(0,196,179,.35),inset 0 1px 0 rgba(255,255,255,.25);
  }
  .brand .mark svg{width:22px;height:22px}
  .brand h1{font-size:24px;font-weight:800;letter-spacing:-.02em;line-height:1}
  .brand span{display:block;font-size:11.5px;color:var(--ink-soft);font-weight:600;margin-top:3px;letter-spacing:.01em}

  .nav{display:flex;flex-direction:column;gap:3px;margin-top:4px}
  .nav-label{font-size:10px;text-transform:uppercase;letter-spacing:.16em;color:var(--muted);font-weight:800;padding:16px 12px 7px}
  .nav-item{
    display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:11px;cursor:pointer;
    font-size:14.5px;font-weight:600;color:var(--ink-soft);user-select:none;
    border:1px solid transparent;transition:.16s;position:relative;
  }
  .nav-item svg{width:18px;height:18px;flex:0 0 18px}
  .nav-item:hover{background:var(--surface);color:var(--ink)}
  .nav-item.active{
    background:linear-gradient(100deg,rgba(0,196,179,.18),rgba(0,196,179,.05));
    color:#fff;border-color:var(--line);box-shadow:inset 0 1px 0 rgba(255,255,255,.06);
  }
  .nav-item.active::before{content:"";position:absolute;left:-16px;top:50%;transform:translateY(-50%);width:3px;height:22px;border-radius:0 3px 3px 0;background:var(--teal);box-shadow:0 0 12px var(--teal)}
  .nav-item .chev{margin-left:auto;width:15px;height:15px;transition:transform .22s;opacity:.6}
  .nav-item.open .chev{transform:rotate(90deg)}

  .submenu{display:flex;flex-direction:column;gap:2px;margin:2px 0 4px;max-height:0;overflow:hidden;transition:max-height .28s ease}
  .submenu.open{max-height:240px}
  .sub-item{
    display:flex;align-items:center;gap:11px;padding:8px 12px 8px 16px;margin-left:15px;border-radius:9px;cursor:pointer;
    font-size:13.5px;font-weight:600;color:var(--ink-soft);border-left:1px solid var(--line-soft);transition:.15s;
  }
  .sub-item:hover{background:var(--surface);color:var(--ink)}
  .sub-item.active{background:var(--surface-2);color:#fff}
  .dot{width:9px;height:9px;border-radius:50%;flex:0 0 9px}

  .side-foot{margin-top:auto;padding:14px 12px 4px;border-top:1px solid var(--line-soft)}
  .sync{display:flex;align-items:center;gap:8px;font-size:11.5px;color:var(--muted);font-weight:600}
  .sync .live{width:7px;height:7px;border-radius:50%;background:var(--green);box-shadow:0 0 0 3px rgba(61,214,140,.18),0 0 10px var(--green)}
  .sync b{color:var(--ink-soft);font-weight:700}

  /* ---------- MAIN ---------- */
  .main{flex:1;min-width:0;position:relative;z-index:1;display:flex;flex-direction:column}
  .topbar{
    display:flex;align-items:center;gap:18px;padding:20px 34px;
    border-bottom:1px solid var(--line-soft);
    background:linear-gradient(180deg,rgba(8,19,15,.7),rgba(8,19,15,.25));
    backdrop-filter:blur(12px);position:sticky;top:0;z-index:4;
  }
  .topbar .ttl{font-size:25px;font-weight:800;letter-spacing:-.02em;line-height:1.1}
  .topbar .sub{font-size:13px;color:var(--ink-soft);font-weight:550;margin-top:3px}
  .today-chip{
    margin-left:auto;display:flex;align-items:center;gap:8px;color:#031a16;
    background:linear-gradient(135deg,var(--teal),var(--green));border-radius:11px;
    padding:9px 14px;font-size:13px;font-weight:800;box-shadow:0 8px 20px rgba(0,196,179,.25)
  }
  .today-chip svg{width:15px;height:15px}
  .avatars{display:flex}
  .avatars .av{
    width:33px;height:33px;border-radius:50%;margin-left:-9px;border:2px solid var(--bg2);
    display:flex;align-items:center;justify-content:center;color:#04130f;font-size:13px;font-weight:800;
  }

  .canvas{padding:30px 34px 56px;flex:1;overflow:auto}

  .fade{opacity:0;transform:translateY(10px);animation:rise .55s cubic-bezier(.2,.7,.3,1) forwards}
  @keyframes rise{to{opacity:1;transform:none}}

  /* ---------- CALENDAR ---------- */
  .cal-head{display:flex;align-items:center;gap:16px;margin-bottom:20px;flex-wrap:wrap}
  .cal-head .mo{font-size:21px;font-weight:800;letter-spacing:-.01em}
  .arrows{display:flex;gap:6px}
  .arrows button{
    width:33px;height:33px;border-radius:9px;border:1px solid var(--line-soft);background:var(--surface);color:var(--ink-soft);
    cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:17px;transition:.15s
  }
  .arrows button:hover{background:var(--surface-2);color:#fff}
  .legend{margin-left:auto;display:flex;flex-wrap:wrap;gap:7px}
  .lg{
    display:flex;align-items:center;gap:7px;font-size:12px;font-weight:700;color:var(--ink-soft);
    background:var(--surface);border:1px solid var(--line-soft);border-radius:20px;padding:5px 11px 5px 9px;cursor:pointer;transition:.15s;user-select:none
  }
  .lg:hover{background:var(--surface-2);color:#fff}
  .lg.off{opacity:.32}
  .lg .dot{width:8px;height:8px}

  .calendar{background:var(--glass);border:1px solid var(--line-soft);border-radius:18px;overflow:hidden;box-shadow:var(--shadow);backdrop-filter:blur(10px)}
  .weekdays{display:grid;grid-template-columns:repeat(7,1fr);border-bottom:1px solid var(--line-soft);background:rgba(0,196,179,.04)}
  .weekdays div{padding:12px 13px;font-size:10.5px;font-weight:800;text-transform:uppercase;letter-spacing:.1em;color:var(--muted)}
  .grid{display:grid;grid-template-columns:repeat(7,1fr);grid-auto-rows:minmax(116px,1fr)}
  .cell{border-right:1px solid var(--line-soft);border-bottom:1px solid var(--line-soft);padding:9px 9px 7px;position:relative;transition:background .15s}
  .cell:nth-child(7n){border-right:none}
  .cell.out{background:rgba(0,0,0,.18)}
  .cell.out .num{color:#3c5249}
  .cell:hover{background:rgba(0,196,179,.05)}
  .num{font-size:13px;font-weight:700;color:var(--ink-soft);margin-bottom:6px;display:inline-flex;align-items:center;justify-content:center;width:25px;height:25px;border-radius:50%}
  .cell.today{background:rgba(0,196,179,.08)}
  .cell.today .num{background:linear-gradient(135deg,var(--teal),var(--green));color:#04130f;box-shadow:0 4px 12px rgba(0,196,179,.4)}
  .ev{
    font-size:11px;font-weight:700;border-radius:7px;padding:4px 8px;margin-bottom:4px;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer;transition:.13s;line-height:1.3;
    border-left:2px solid;
  }
  .ev:hover{transform:translateX(2px);filter:brightness(1.12)}
  .ev.soft{background:transparent!important;border-left:none!important;padding-left:15px;position:relative;color:var(--ink-soft)!important;font-weight:600}
  .ev.soft .sdot{position:absolute;left:5px;top:50%;transform:translateY(-50%);width:6px;height:6px;border-radius:50%}
  .more{font-size:10.5px;color:var(--muted);font-weight:700;padding-left:3px}

  /* ---------- BANNER / VIEWS ---------- */
  .banner{
    position:relative;overflow:hidden;border-radius:18px;padding:24px 26px;margin-bottom:22px;
    background:var(--glass);border:1px solid var(--line-soft);box-shadow:var(--shadow);
    display:flex;align-items:center;gap:18px;backdrop-filter:blur(10px)
  }
  .banner .glow{position:absolute;right:-60px;top:-80px;width:280px;height:280px;border-radius:50%;filter:blur(20px);opacity:.5}
  .banner .big-av{width:62px;height:62px;border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:27px;font-weight:800;color:#04130f;flex:0 0 62px;box-shadow:0 10px 26px rgba(0,0,0,.35)}
  .banner h2{font-size:27px;font-weight:800;letter-spacing:-.02em;position:relative}
  .banner p{font-size:13.5px;color:var(--ink-soft);font-weight:600;margin-top:4px;position:relative}
  .bstats{margin-left:auto;display:flex;gap:14px;position:relative;z-index:1}
  .bstat{background:var(--surface);border:1px solid var(--line-soft);border-radius:13px;padding:12px 18px;text-align:center;min-width:78px}
  .bstat .n{font-size:24px;font-weight:800;line-height:1}
  .bstat .l{font-size:10.5px;color:var(--ink-soft);font-weight:700;text-transform:uppercase;letter-spacing:.05em;margin-top:6px}

  .cols{display:grid;grid-template-columns:1.5fr 1fr;gap:20px;align-items:start}
  @media(max-width:1000px){.cols{grid-template-columns:1fr}}
  .panel{background:var(--glass);border:1px solid var(--line-soft);border-radius:16px;padding:20px 22px;box-shadow:var(--shadow);backdrop-filter:blur(10px)}
  .panel h3{font-size:16px;font-weight:800;margin-bottom:14px;display:flex;align-items:center;gap:9px;letter-spacing:-.01em}
  .panel h3 .count{font-size:11.5px;font-weight:800;color:var(--ink-soft);background:var(--surface);border:1px solid var(--line-soft);border-radius:20px;padding:3px 10px;margin-left:auto}

  .task{display:flex;align-items:flex-start;gap:12px;padding:13px 4px;border-bottom:1px solid var(--line-soft);cursor:pointer}
  .task:last-child{border-bottom:none}
  .check{width:20px;height:20px;border-radius:6px;border:2px solid #3a5650;flex:0 0 20px;margin-top:1px;transition:.15s;display:flex;align-items:center;justify-content:center}
  .check svg{width:12px;height:12px;color:#04130f;opacity:0;transform:scale(.5);transition:.15s}
  .task.done .check{background:var(--green);border-color:var(--green);box-shadow:0 0 12px rgba(61,214,140,.4)}
  .task.done .check svg{opacity:1;transform:none}
  .task.done .t-title{text-decoration:line-through;color:var(--muted)}
  .t-body{flex:1;min-width:0}
  .t-title{font-size:14px;font-weight:650;line-height:1.4;color:var(--ink)}
  .t-meta{display:flex;align-items:center;gap:9px;margin-top:6px;font-size:11.5px;color:var(--muted);font-weight:700;flex-wrap:wrap}
  .pill{display:inline-flex;align-items:center;border-radius:20px;padding:2px 9px;font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.04em}
  .pri-hi{background:rgba(244,162,97,.16);color:var(--orange)}
  .pri-md{background:rgba(255,209,102,.14);color:var(--yellow)}
  .pri-lo{background:rgba(0,196,179,.14);color:var(--teal)}
  .tag{background:var(--surface);border:1px solid var(--line-soft);color:var(--ink-soft);border-radius:20px;padding:2px 9px;font-size:10px;font-weight:700}
  .due{display:inline-flex;align-items:center;gap:4px}
  .due svg{width:12px;height:12px}

  .agenda-item{display:flex;gap:13px;padding:12px 2px;border-bottom:1px solid var(--line-soft)}
  .agenda-item:last-child{border-bottom:none}
  .ag-date{flex:0 0 44px;text-align:center}
  .ag-date .d{font-size:20px;font-weight:800;line-height:1}
  .ag-date .m{font-size:10px;font-weight:800;text-transform:uppercase;color:var(--muted);letter-spacing:.08em;margin-top:3px}
  .ag-body{flex:1;border-left:3px solid;padding-left:13px}
  .ag-body .at{font-size:13.5px;font-weight:700}
  .ag-body .am{font-size:11.5px;color:var(--muted);font-weight:700;margin-top:2px}

  .gro-group{margin-bottom:20px}
  .gro-group:last-child{margin-bottom:0}
  .gro-group h4{font-size:11px;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);font-weight:800;margin-bottom:9px;display:flex;align-items:center;gap:8px}
  .gitem{display:flex;align-items:center;gap:11px;padding:10px 4px;border-bottom:1px solid var(--line-soft);cursor:pointer;font-size:13.5px;font-weight:600}
  .gitem:last-child{border-bottom:none}
  .gitem.done{color:var(--muted)}
  .gitem.done .gtxt{text-decoration:line-through}
  .gitem .qty{margin-left:auto;font-size:11.5px;color:var(--muted);font-weight:700}

  .hint{margin-top:18px;background:rgba(0,196,179,.07);border:1px dashed var(--line);border-radius:13px;padding:14px 16px;display:flex;gap:12px;align-items:flex-start}
  .hint svg{width:18px;height:18px;color:var(--teal);flex:0 0 18px;margin-top:1px}
  .hint p{font-size:12.5px;line-height:1.55;color:var(--ink-soft)}
  .hint b{color:var(--teal)}

  .ask{display:flex;align-items:center;gap:12px;background:var(--glass);border:1px solid var(--line);border-radius:14px;padding:13px 15px;margin-top:22px;box-shadow:var(--glow);backdrop-filter:blur(10px)}
  .ask .ai{width:32px;height:32px;border-radius:9px;background:linear-gradient(150deg,var(--teal),var(--green));display:flex;align-items:center;justify-content:center;flex:0 0 32px;box-shadow:0 6px 16px rgba(0,196,179,.35)}
  .ask .ai svg{width:17px;height:17px;color:#04130f}
  .ask input{flex:1;border:none;background:none;font-family:inherit;font-size:14px;font-weight:550;color:var(--ink);outline:none}
  .ask input::placeholder{color:var(--muted)}
  .ask .send{font-size:12px;font-weight:800;color:#04130f;background:linear-gradient(135deg,var(--teal),var(--green));border:none;border-radius:9px;padding:9px 15px;cursor:pointer}
</style>
</head>
<body>

<aside class="sidebar">
  <div class="brand">
    <div class="mark">
      <svg viewBox="0 0 24 24" fill="none" stroke="#04130f" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 11l9-8 9 8"/><path d="M5 10v10h14V10"/><path d="M10 20v-5h4v5"/></svg>
    </div>
    <div><h1>Hearth</h1><span>The Rowe Family</span></div>
  </div>

  <nav class="nav">
    <div class="nav-item active" data-view="calendar">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><rect x="3" y="4" width="18" height="17" rx="2"/><path d="M3 9h18M8 2v4M16 2v4"/></svg>Calendar
    </div>

    <div class="nav-label">Spaces</div>

    <div class="nav-item" id="familyToggle">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"/></svg>Family
      <svg class="chev" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><path d="M9 6l6 6-6 6"/></svg>
    </div>
    <div class="submenu" id="familyMenu">
      <div class="sub-item" data-view="mom"><span class="dot" style="background:var(--teal)"></span>Mom · Susanna</div>
      <div class="sub-item" data-view="dad"><span class="dot" style="background:var(--green)"></span>Dad · Justin</div>
      <div class="sub-item" data-view="lincoln"><span class="dot" style="background:var(--yellow)"></span>Lincoln</div>
      <div class="sub-item" data-view="declan"><span class="dot" style="background:var(--orange)"></span>Declan</div>
    </div>

    <div class="nav-item" data-view="house">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><path d="M9 22V12h6v10"/></svg>House
    </div>
    <div class="nav-item" data-view="grocery">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.7 13.4a2 2 0 0 0 2 1.6h9.7a2 2 0 0 0 2-1.6L23 6H6"/></svg>Grocery
    </div>
    <div class="nav-item" data-view="health">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M20.8 4.6a5.5 5.5 0 0 0-7.8 0L12 5.7l-1-1a5.5 5.5 0 0 0-7.8 7.8L12 21l8.8-8.6a5.5 5.5 0 0 0 0-7.8z"/></svg>Health &amp; Wellness
    </div>
  </nav>

  <div class="side-foot">
    <div class="sync"><span class="live"></span>Synced with <b>ClickUp</b> · powered by <b>Claude</b></div>
  </div>
</aside>

<main class="main">
  <div class="topbar">
    <div>
      <div class="ttl" id="viewTitle">June 2026</div>
      <div class="sub" id="viewSub">Everything the family has going on, in one place</div>
    </div>
    <div class="today-chip">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>Thu, June 4
    </div>
    <div class="avatars">
      <div class="av" style="background:var(--teal)">S</div>
      <div class="av" style="background:var(--green)">J</div>
      <div class="av" style="background:var(--yellow)">L</div>
      <div class="av" style="background:var(--orange)">D</div>
    </div>
  </div>
  <div class="canvas" id="canvas"></div>
</main>

<script>
const COLORS={mom:'#00C4B3',dad:'#3DD68C',lincoln:'#FFD166',declan:'#F4A261',house:'#5FB3A1',grocery:'#9CCB5A',health:'#2BB3A3',dates:'#7FE0C4'};
const CATLABEL={mom:'Mom',dad:'Dad',lincoln:'Lincoln',declan:'Declan',house:'House',grocery:'Grocery',health:'Health',dates:'Dates'};

const events={
  '5-31':[{t:'Pool afternoon',c:'health'}],
  '6-1':[{t:'IRS payment · $500',c:'dad'},{t:'Lincoln reading 20m',c:'lincoln'}],
  '6-2':[{t:'Soccer practice',c:'lincoln'},{t:'Declan nap 1:30–4',c:'declan',soft:true}],
  '6-3':[{t:'Gym · Push',c:'dad'},{t:'Declan nap 1:30–4',c:'declan',soft:true}],
  '6-4':[{t:'First Steps call · 10a',c:'declan'},{t:'Declan nap 1:30–4',c:'declan',soft:true},{t:'Gym · Pull',c:'dad'}],
  '6-5':[{t:'Grove Bros · ceiling fan 9a',c:'house'},{t:'Library trip',c:'mom'}],
  '6-6':[{t:'Nature walk + birding',c:'mom'},{t:'Grocery pickup',c:'grocery'}],
  '6-7':[{t:'Family pool day',c:'health'}],
  '6-8':[{t:'Summer reading starts',c:'lincoln'},{t:'Gym · Legs',c:'dad'}],
  '6-9':[{t:'🎂 Pierce\'s Birthday',c:'dates'}],
  '6-11':[{t:'Mount hallway mirror',c:'house'}],
  '6-13':[{t:'Dental cleaning · 2p',c:'health'},{t:'Grocery pickup',c:'grocery'}],
  '6-15':[{t:'Soccer practice',c:'lincoln'}],
  '6-16':[{t:'Stain deck wood',c:'house'}],

const canvas=document.getElementById('canvas'),titleEl=document.getElementById('viewTitle'),subEl=document.getElementById('viewSub');
let activeFilters=new Set(Object.keys(COLORS));

const checkSVG='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg>';
const clockSVG='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>';

function tint(hex,a){const n=parseInt(hex.slice(1),16);return `rgba(${n>>16&255},${n>>8&255},${n&255},${a})`}

function taskRow(x){
  const pc={hi:'pri-hi',md:'pri-md',lo:'pri-lo'}[x.pri],pl={hi:'High',md:'Med',lo:'Low'}[x.pri];
  const dueCls=x.due==='Today'?'style="color:var(--teal)"':'';
  return `<div class="task" onclick="this.classList.toggle('done')"><div class="check">${checkSVG}</div>
    <div class="t-body"><div class="t-title">${x.t}</div>
    <div class="t-meta"><span class="pill ${pc}">${pl}</span><span class="tag">${x.tag}</span><span class="due" ${dueCls}>${clockSVG}${x.due}</span></div></div></div>`;
}
function askBar(ph){return `<div class="ask fade" style="animation-delay:.18s"><div class="ai"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 2l2.4 5.6L20 9l-4.5 4 1.3 6L12 16l-4.8 3 1.3-6L4 9l5.6-1.4z"/></svg></div><input placeholder="${ph}"><button class="send">Ask Claude</button></div>`;}
function agendaFor(cat){const o=[];Object.keys(events).forEach(k=>events[k].forEach(e=>{if(e.c===cat)o.push({day:k.split('-')[1],t:e.t,c:e.c})}));return o.slice(0,6);}
function agendaHTML(list){return list.length?list.map(a=>`<div class="agenda-item"><div class="ag-date"><div class="d">${a.day}</div><div class="m">Jun</div></div><div class="ag-body" style="border-color:${COLORS[a.c]}"><div class="at">${a.t}</div><div class="am">${CATLABEL[a.c]}</div></div></div>`).join(''):'<p style="color:var(--muted);font-size:13px">Nothing scheduled.</p>';}

function renderCalendar(){
  titleEl.textContent='June 2026';subEl.textContent='Everything the family has going on, in one place';
  const start=new Date(2026,4,31),wd=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const legend=Object.keys(COLORS).map(k=>`<div class="lg ${activeFilters.has(k)?'':'off'}" data-f="${k}"><span class="dot" style="background:${COLORS[k]}"></span>${CATLABEL[k]}</div>`).join('');
  let cells='';
  for(let i=0;i<35;i++){
    const d=new Date(start);d.setDate(start.getDate()+i);
    const mo=d.getMonth(),day=d.getDate(),inJune=mo===5,key=(mo+1)+'-'+day,isToday=inJune&&day===4;
    const evs=(events[key]||[]).filter(e=>activeFilters.has(e.c));
    let h='';
    evs.slice(0,3).forEach(e=>{
      const col=COLORS[e.c];
      if(e.soft)h+=`<div class="ev soft"><span class="sdot" style="background:${col}"></span>${e.t}</div>`;
      else h+=`<div class="ev" style="background:${tint(col,.16)};border-left-color:${col};color:${col}">${e.t}</div>`;
    });
    if(evs.length>3)h+=`<div class="more">+${evs.length-3} more</div>`;
    cells+=`<div class="cell ${inJune?'':'out'} ${isToday?'today':''}"><span class="num">${day}</span>${h}</div>`;
  }
  canvas.innerHTML=`<div class="cal-head fade"><div class="mo">June 2026</div><div class="arrows"><button>‹</button><button>›</button></div><div class="legend">${legend}</div></div>
    <div class="calendar fade" style="animation-delay:.05s"><div class="weekdays">${wd.map(w=>`<div>${w}</div>`).join('')}</div><div class="grid">${cells}</div></div>
    ${askBar('Ask anything — “What’s on for Saturday?” or “Add a dentist appt for Declan next week”')}`;
  document.querySelectorAll('.lg').forEach(el=>el.onclick=()=>{const f=el.dataset.f;activeFilters.has(f)?activeFilters.delete(f):activeFilters.add(f);renderCalendar();});
}

function bannerHTML(initial,col,name,role,stats){
  return `<div class="banner fade"><div class="glow" style="background:${col}"></div>
    <div class="big-av" style="background:${col}">${initial}</div>
    <div><h2>${name}</h2><p>${role}</p></div>
    <div class="bstats">${stats.map(s=>`<div class="bstat"><div class="n" style="color:${col}">${s[0]}</div><div class="l">${s[1]}</div></div>`).join('')}</div></div>`;
}
function personView(key){
  const p=people[key],col=COLORS[p.color];
  titleEl.textContent=p.name;subEl.textContent=p.role;
  canvas.innerHTML=bannerHTML(p.initial,col,p.name,p.role,p.stats)+
    `<div class="cols"><div class="panel fade" style="animation-delay:.05s"><h3>Tasks <span class="count">${p.tasks.length} open</span></h3>${p.tasks.map(taskRow).join('')}</div>
    <div class="panel fade" style="animation-delay:.1s"><h3>Up next</h3>${agendaHTML(agendaFor(key))}</div></div>${askBar('Ask Claude to add or reschedule something for '+p.name+'…')}`;
}
function listView(key,label,sub,data,cat){
  titleEl.textContent=label;subEl.textContent=sub;const col=COLORS[key];
  canvas.innerHTML=bannerHTML(label[0],col,label,sub,data.stats)+
    `<div class="cols"><div class="panel fade" style="animation-delay:.05s"><h3>Tasks <span class="count">${data.tasks.length} open</span></h3>${data.tasks.map(taskRow).join('')}</div>
    <div class="panel fade" style="animation-delay:.1s"><h3>On the calendar</h3>${agendaHTML(agendaFor(cat))}</div></div>${askBar('Ask Claude about '+label.toLowerCase()+'…')}`;
}
function groceryView(){
  titleEl.textContent='Grocery';subEl.textContent='This week’s list · pickup Saturday';const col=COLORS.grocery;
  const groups=grocery.groups.map(g=>`<div class="gro-group"><h4><span class="dot" style="background:${GROCOL[g.c]}"></span>${g.name}</h4>
    ${g.items.map(it=>`<div class="gitem" onclick="this.classList.toggle('done')"><div class="check">${checkSVG}</div><span class="gtxt">${it[0]}</span><span class="qty">${it[1]}</span></div>`).join('')}</div>`).join('');
  canvas.innerHTML=bannerHTML('G',col,'Grocery','This week’s list · pickup Saturday',[['17','Items'],['5','Aisles'],['Sat','Pickup']])+
    `<div class="cols"><div class="panel fade" style="animation-delay:.05s"><h3>Shopping list</h3>${groups}</div>
    <div class="panel fade" style="animation-delay:.1s"><h3>Up next</h3>${agendaHTML(agendaFor('grocery'))}
    <div class="hint"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4M12 8h.01"/></svg><p><b>Idea:</b> checkbox state here could push straight to Instacart for Saturday pickup.</p></div></div></div>
    ${askBar('“Add taco-night ingredients” or “What’s already on the list?”')}`;
}

function setActive(v){document.querySelectorAll('.nav-item,.sub-item').forEach(n=>n.classList.remove('active'));const el=document.querySelector(`[data-view="${v}"]`);if(el)el.classList.add('active');}
function go(v){setActive(v);
  if(v==='calendar')renderCalendar();
  else if(people[v])personView(v);
  else if(v==='house')listView('house','House','Projects, maintenance & the Grove Brothers punch-list',house,'house');
  else if(v==='grocery')groceryView();
  else if(v==='health')listView('health','Health & Wellness','Appointments, fitness & the family’s well-being',health,'health');
}
document.querySelectorAll('[data-view]').forEach(el=>el.addEventListener('click',()=>go(el.dataset.view)));

ft.addEventListener('click',()=>{ft.classList.toggle('open');fm.classList.toggle('open')});
ft.classList.add('open');fm.classList.add('open');
renderCalendar();
</script>
