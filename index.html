<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hearth — Family Operating System</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource-variable/mona-sans/index.css">
<style>
  :root{
    --forest:#27AE60;--forest-2:#1C8C4C;--forest-deep:#0E5A30;
    --bark:#6E4A2C;--bark-lt:#C7A472;--bark-2:#46301C;
    --fern:#2E9E8A;--amber:#D2A52C;--clay:#9A6A3E;--leaf:#7FB13C;--sage:#4FA38C;--gold:#B98A3A;--moss:#8AA76A;
    --bg:#0A0D09;--bg2:#0D110B;
    --surface:rgba(255,255,255,.04);--surface-2:rgba(255,255,255,.07);
    --glass:rgba(17,23,15,.62);--line:rgba(39,174,96,.16);--line-soft:rgba(255,255,255,.06);
    --ink:#E9F0E4;--ink-soft:#AEBEA4;--muted:#72826A;
    --font:'Mona Sans Variable','Mona Sans','Helvetica Neue',Helvetica,Arial,sans-serif;
    --shadow:0 1px 2px rgba(0,0,0,.4),0 18px 50px rgba(0,0,0,.5);
    --glow:0 0 0 1px rgba(39,174,96,.2),0 12px 40px rgba(39,174,96,.1);
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%}
  body{font-family:var(--font);background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased;display:flex;min-height:100vh;overflow-x:hidden;font-weight:450}
  body::before{content:"";position:fixed;inset:0;z-index:0;pointer-events:none;
    background:radial-gradient(55% 50% at 8% 0%,rgba(39,174,96,.12),transparent 60%),radial-gradient(45% 45% at 96% 6%,rgba(110,74,44,.1),transparent 60%),radial-gradient(65% 60% at 82% 100%,rgba(14,90,48,.35),transparent 60%),linear-gradient(180deg,var(--bg),var(--bg2))}
  body::after{content:"";position:fixed;inset:0;z-index:0;pointer-events:none;opacity:.3;background-image:radial-gradient(rgba(255,255,255,.03) 1px,transparent 1px);background-size:3px 3px}

  .sidebar{width:268px;flex:0 0 268px;position:sticky;top:0;height:100vh;z-index:3;background:linear-gradient(180deg,rgba(16,22,13,.94),rgba(9,12,8,.95));border-right:1px solid var(--line-soft);backdrop-filter:blur(14px);display:flex;flex-direction:column;padding:24px 16px 16px;overflow-y:auto}
  .brand{display:flex;align-items:center;gap:12px;padding:4px 8px 22px}
  .brand .mark{width:40px;height:40px;border-radius:12px;flex:0 0 40px;background:linear-gradient(150deg,var(--forest),var(--forest-deep));display:flex;align-items:center;justify-content:center;box-shadow:0 8px 22px rgba(39,174,96,.28),inset 0 1px 0 rgba(255,255,255,.22)}
  .brand .mark svg{width:22px;height:22px}
  .brand h1{font-size:24px;font-weight:800;letter-spacing:-.02em;line-height:1}
  .brand span{display:block;font-size:11.5px;color:var(--ink-soft);font-weight:600;margin-top:3px}
  .nav{display:flex;flex-direction:column;gap:3px}
  .nav-label{font-size:10px;text-transform:uppercase;letter-spacing:.16em;color:var(--muted);font-weight:800;padding:15px 12px 7px}
  .nav-item{display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:11px;cursor:pointer;font-size:14.5px;font-weight:600;color:var(--ink-soft);user-select:none;border:1px solid transparent;transition:.16s;position:relative}
  .nav-item svg{width:18px;height:18px;flex:0 0 18px}
  .nav-item:hover{background:var(--surface);color:var(--ink)}
  .nav-item.active{background:linear-gradient(100deg,rgba(39,174,96,.18),rgba(39,174,96,.04));color:#fff;border-color:var(--line)}
  .nav-item.active::before{content:"";position:absolute;left:-16px;top:50%;transform:translateY(-50%);width:3px;height:22px;border-radius:0 3px 3px 0;background:var(--forest);box-shadow:0 0 12px var(--forest)}
  .nav-item .chev{margin-left:auto;width:15px;height:15px;transition:transform .22s;opacity:.6}
  .nav-item.open .chev{transform:rotate(90deg)}
  .nav-item .badge{margin-left:auto;font-size:10px;font-weight:800;color:#0A0D09;background:var(--forest);border-radius:20px;padding:1px 7px}
  .submenu{display:flex;flex-direction:column;gap:2px;margin:2px 0 4px;max-height:0;overflow:hidden;transition:max-height .28s ease}
  .submenu.open{max-height:240px}
  .sub-item{display:flex;align-items:center;gap:11px;padding:8px 12px 8px 16px;margin-left:15px;border-radius:9px;cursor:pointer;font-size:13.5px;font-weight:600;color:var(--ink-soft);border-left:1px solid var(--line-soft);transition:.15s}
  .sub-item:hover{background:var(--surface);color:var(--ink)}
  .sub-item.active{background:var(--surface-2);color:#fff}
  .dot{width:9px;height:9px;border-radius:50%;flex:0 0 9px}
  .side-foot{margin-top:auto;padding:14px 12px 4px;border-top:1px solid var(--line-soft)}
  .sync{display:flex;align-items:center;gap:8px;font-size:11.5px;color:var(--muted);font-weight:600}
  .sync .live{width:7px;height:7px;border-radius:50%;background:var(--forest);box-shadow:0 0 0 3px rgba(39,174,96,.18),0 0 10px var(--forest)}
  .sync b{color:var(--ink-soft);font-weight:700}

  .main{flex:1;min-width:0;position:relative;z-index:1;display:flex;flex-direction:column}
  .topbar{display:flex;align-items:center;gap:18px;padding:20px 34px;border-bottom:1px solid var(--line-soft);background:linear-gradient(180deg,rgba(10,13,9,.78),rgba(10,13,9,.3));backdrop-filter:blur(12px);position:sticky;top:0;z-index:4}
  .topbar .ttl{font-size:25px;font-weight:800;letter-spacing:-.02em;line-height:1.1}
  .topbar .sub{font-size:13px;color:var(--ink-soft);font-weight:550;margin-top:3px}
  .today-chip{margin-left:auto;display:flex;align-items:center;gap:8px;color:#0A0D09;background:linear-gradient(135deg,var(--forest),var(--forest-2));border-radius:11px;padding:9px 14px;font-size:13px;font-weight:800;box-shadow:0 8px 20px rgba(39,174,96,.22)}
  .today-chip svg{width:15px;height:15px}
  .avatars{display:flex}
  .avatars .av{width:33px;height:33px;border-radius:50%;margin-left:-9px;border:2px solid var(--bg2);display:flex;align-items:center;justify-content:center;color:#0A0D09;font-size:13px;font-weight:800}
  .canvas{padding:28px 34px 56px;flex:1;overflow:auto}
  .fade{opacity:0;transform:translateY(10px);animation:rise .5s cubic-bezier(.2,.7,.3,1) forwards}
  @keyframes rise{to{opacity:1;transform:none}}
  .space-sec{margin-bottom:22px}
  .subhead{display:flex;align-items:center;gap:11px;font-size:12px;text-transform:uppercase;letter-spacing:.12em;color:var(--muted);font-weight:800;margin:0 0 13px}
  .subhead .acc{width:16px;height:2px;border-radius:2px;background:var(--forest)}

  .cal-head{display:flex;align-items:center;gap:16px;margin-bottom:18px;flex-wrap:wrap}
  .cal-head .mo{font-size:21px;font-weight:800}
  .arrows{display:flex;gap:6px}
  .arrows button{width:33px;height:33px;border-radius:9px;border:1px solid var(--line-soft);background:var(--surface);color:var(--ink-soft);cursor:pointer;font-size:17px}
  .arrows button:hover{background:var(--surface-2);color:#fff}
  .legend{margin-left:auto;display:flex;flex-wrap:wrap;gap:7px}
  .lg{display:flex;align-items:center;gap:7px;font-size:12px;font-weight:700;color:var(--ink-soft);background:var(--surface);border:1px solid var(--line-soft);border-radius:20px;padding:5px 11px 5px 9px;cursor:pointer;user-select:none}
  .lg:hover{background:var(--surface-2);color:#fff}.lg.off{opacity:.32}.lg .dot{width:8px;height:8px}
  .calendar{background:var(--glass);border:1px solid var(--line-soft);border-radius:18px;overflow:hidden;box-shadow:var(--shadow);backdrop-filter:blur(10px)}
  .weekdays{display:grid;grid-template-columns:repeat(7,1fr);border-bottom:1px solid var(--line-soft);background:rgba(39,174,96,.04)}
  .weekdays div{padding:11px 13px;font-size:10.5px;font-weight:800;text-transform:uppercase;letter-spacing:.1em;color:var(--muted)}
  .grid{display:grid;grid-template-columns:repeat(7,1fr);grid-auto-rows:minmax(112px,1fr)}
  .calendar.compact .grid{grid-auto-rows:minmax(78px,auto)}
  .cell{border-right:1px solid var(--line-soft);border-bottom:1px solid var(--line-soft);padding:8px 8px 6px;position:relative}
  .cell:nth-child(7n){border-right:none}
  .cell.out{background:rgba(0,0,0,.28)}.cell.out .num{color:#36402f}
  .cell:hover{background:rgba(39,174,96,.05)}
  .num{font-size:13px;font-weight:700;color:var(--ink-soft);margin-bottom:5px;display:inline-flex;align-items:center;justify-content:center;width:24px;height:24px;border-radius:50%}
  .cell.today{background:rgba(39,174,96,.08)}.cell.today .num{background:linear-gradient(135deg,var(--forest),var(--forest-2));color:#0A0D09;box-shadow:0 4px 12px rgba(39,174,96,.4)}
  .ev{font-size:11px;font-weight:700;border-radius:7px;padding:4px 8px;margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer;line-height:1.3;border-left:2px solid}
  .ev:hover{transform:translateX(2px);filter:brightness(1.12)}
  .ev.soft{background:transparent!important;border-left:none!important;padding-left:15px;position:relative;color:var(--ink-soft)!important;font-weight:600}
  .ev.soft .sdot{position:absolute;left:5px;top:50%;transform:translateY(-50%);width:6px;height:6px;border-radius:50%}
  .more{font-size:10.5px;color:var(--muted);font-weight:700;padding-left:3px}

  .banner{position:relative;overflow:hidden;border-radius:18px;padding:24px 26px;margin-bottom:22px;background:var(--glass);border:1px solid var(--line-soft);box-shadow:var(--shadow);display:flex;align-items:center;gap:18px;backdrop-filter:blur(10px)}
  .banner .glow{position:absolute;right:-60px;top:-80px;width:280px;height:280px;border-radius:50%;filter:blur(20px);opacity:.4}
  .banner .big-av{width:62px;height:62px;border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:27px;font-weight:800;color:#0A0D09;flex:0 0 62px;box-shadow:0 10px 26px rgba(0,0,0,.4)}
  .banner h2{font-size:27px;font-weight:800;letter-spacing:-.02em;position:relative}
  .banner p{font-size:13.5px;color:var(--ink-soft);font-weight:600;margin-top:4px;position:relative}
  .bstats{margin-left:auto;display:flex;gap:12px;position:relative;z-index:1}
  .bstat{background:var(--surface);border:1px solid var(--line-soft);border-radius:13px;padding:11px 16px;text-align:center;min-width:74px}
  .bstat .n{font-size:23px;font-weight:800;line-height:1}
  .bstat .l{font-size:10px;color:var(--ink-soft);font-weight:700;text-transform:uppercase;letter-spacing:.05em;margin-top:6px}

  .tabs{display:flex;gap:5px;margin-bottom:18px;flex-wrap:wrap;border-bottom:1px solid var(--line-soft)}
  .tab{display:flex;align-items:center;gap:8px;padding:10px 14px;border-radius:11px 11px 0 0;cursor:pointer;font-size:13px;font-weight:700;color:var(--ink-soft);border:1px solid transparent;border-bottom:none;position:relative;top:1px}
  .tab svg{width:15px;height:15px}
  .tab:hover{color:#fff;background:var(--surface)}
  .tab.active{color:#fff;background:var(--glass);border-color:var(--line-soft)}
  .tab.active::after{content:"";position:absolute;left:0;right:0;bottom:-1px;height:2px;background:linear-gradient(90deg,var(--forest),var(--forest-2))}
  .tab .pip{background:var(--surface-2);border-radius:20px;font-size:10px;padding:1px 7px;font-weight:800;color:var(--ink-soft)}
  .tabpanel{display:none}.tabpanel.active{display:block;animation:rise .4s cubic-bezier(.2,.7,.3,1)}

  .cols{display:grid;grid-template-columns:1.5fr 1fr;gap:20px;align-items:start}
  @media(max-width:1000px){.cols{grid-template-columns:1fr}}
  .panel{background:var(--glass);border:1px solid var(--line-soft);border-radius:16px;padding:20px 22px;box-shadow:var(--shadow);backdrop-filter:blur(10px)}
  .panel h3{font-size:16px;font-weight:800;margin-bottom:14px;display:flex;align-items:center;gap:9px}
  .panel h3 .count{font-size:11.5px;font-weight:800;color:var(--ink-soft);background:var(--surface);border:1px solid var(--line-soft);border-radius:20px;padding:3px 10px;margin-left:auto}

  .task{display:flex;align-items:flex-start;gap:12px;padding:13px 4px;border-bottom:1px solid var(--line-soft);cursor:pointer}
  .task:last-child{border-bottom:none}
  .check{width:20px;height:20px;border-radius:6px;border:2px solid #364030;flex:0 0 20px;margin-top:1px;transition:.15s;display:flex;align-items:center;justify-content:center}
  .check svg{width:12px;height:12px;color:#0A0D09;opacity:0;transform:scale(.5);transition:.15s}
  .task.done .check{background:var(--forest);border-color:var(--forest)}
  .task.done .check svg{opacity:1;transform:none}
  .task.done .t-title{text-decoration:line-through;color:var(--muted)}
  .t-body{flex:1;min-width:0}.t-title{font-size:14px;font-weight:650;line-height:1.4}
  .t-meta{display:flex;align-items:center;gap:9px;margin-top:6px;font-size:11.5px;color:var(--muted);font-weight:700;flex-wrap:wrap}
  .pill{display:inline-flex;border-radius:20px;padding:2px 9px;font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.04em}
  .pri-hi{background:rgba(154,106,62,.2);color:var(--clay)}.pri-md{background:rgba(185,138,58,.16);color:var(--gold)}.pri-lo{background:rgba(39,174,96,.16);color:var(--forest)}
  .tag{background:var(--surface);border:1px solid var(--line-soft);color:var(--ink-soft);border-radius:20px;padding:2px 9px;font-size:10px;font-weight:700}
  .due{display:inline-flex;align-items:center;gap:4px}.due svg{width:12px;height:12px}
  .cad{border-radius:20px;padding:2px 9px;font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.04em}
  .cad-daily{background:rgba(39,174,96,.16);color:var(--forest)}
  .cad-weekly{background:rgba(46,158,138,.16);color:var(--fern)}
  .cad-monthly{background:rgba(79,163,140,.16);color:var(--sage)}
  .cad-quarterly{background:rgba(110,74,44,.2);color:var(--bark-lt)}
  .cad-annual{background:rgba(185,138,58,.16);color:var(--gold)}
  .r-edit{margin-left:auto;width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;color:var(--muted);opacity:.55;flex:0 0 28px;transition:.15s}
  .task:hover .r-edit{opacity:1;background:var(--surface-2);color:var(--ink)}
  .r-edit svg{width:14px;height:14px}
  .add-routine{display:flex;align-items:center;gap:9px;padding:13px 14px;border:1.5px dashed var(--line);border-radius:12px;color:var(--ink-soft);font-size:13px;font-weight:700;cursor:pointer;margin-top:12px;transition:.15s}
  .add-routine:hover{background:rgba(39,174,96,.06);color:#fff}
  .add-routine svg{width:16px;height:16px;color:var(--forest)}

  .agenda-item{display:flex;gap:13px;padding:12px 2px;border-bottom:1px solid var(--line-soft)}
  .agenda-item:last-child{border-bottom:none}
  .ag-date{flex:0 0 44px;text-align:center}.ag-date .d{font-size:20px;font-weight:800;line-height:1}.ag-date .m{font-size:10px;font-weight:800;text-transform:uppercase;color:var(--muted);letter-spacing:.08em;margin-top:3px}
  .ag-body{flex:1;border-left:3px solid;padding-left:13px}.ag-body .at{font-size:13.5px;font-weight:700}.ag-body .am{font-size:11.5px;color:var(--muted);font-weight:700;margin-top:2px}

  .kb-bar{display:flex;align-items:center;gap:9px;font-size:12.5px;color:var(--ink-soft);font-weight:700;margin-bottom:16px;background:var(--surface);border:1px solid var(--line-soft);border-radius:11px;padding:10px 14px}
  .kb-bar svg{width:16px;height:16px;color:var(--leaf)}
  .kb-bar .crumb{color:var(--muted)}.kb-bar b{color:var(--ink)}
  .kb-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(168px,1fr));gap:13px}
  .file{background:var(--surface);border:1px solid var(--line-soft);border-radius:14px;padding:16px 15px;cursor:pointer;transition:.16s}
  .file:hover{background:var(--surface-2);transform:translateY(-2px);border-color:var(--line)}
  .file .ic{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:#0A0D09;margin-bottom:12px}
  .file .fn{font-size:13px;font-weight:700;line-height:1.35;margin-bottom:6px;word-break:break-word}
  .file .fm{font-size:11px;color:var(--muted);font-weight:600}
  .upload{border:1.5px dashed var(--line);background:rgba(39,174,96,.05);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;text-align:center;color:var(--ink-soft);min-height:128px}
  .upload svg{width:22px;height:22px;color:var(--forest)}.upload b{font-size:13px;font-weight:700}.upload span{font-size:11px;color:var(--muted)}

  .chat{display:flex;flex-direction:column;gap:14px;margin:16px 0}
  .bubble{max-width:80%;padding:13px 16px;border-radius:16px;font-size:13.5px;line-height:1.55;font-weight:500}
  .bubble.user{align-self:flex-end;background:linear-gradient(135deg,var(--forest),var(--forest-2));color:#0A0D09;font-weight:600;border-bottom-right-radius:5px}
  .bubble.ai{align-self:flex-start;background:var(--surface);border:1px solid var(--line-soft);border-bottom-left-radius:5px}
  .cite{display:inline-flex;align-items:center;gap:6px;margin-top:9px;font-size:11px;font-weight:700;color:var(--forest);background:rgba(39,174,96,.1);border:1px solid rgba(39,174,96,.22);border-radius:8px;padding:4px 9px}
  .cite svg{width:12px;height:12px}

  .contact-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(258px,1fr));gap:14px}
  .contact{background:var(--glass);border:1px solid var(--line-soft);border-radius:15px;padding:18px;box-shadow:var(--shadow)}
  .c-top{display:flex;align-items:center;gap:12px;margin-bottom:14px}
  .c-av{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:800;color:#0A0D09;flex:0 0 44px}
  .c-name{font-size:15px;font-weight:800}.c-role{font-size:11.5px;color:var(--muted);font-weight:700;margin-top:2px}
  .c-row{display:flex;align-items:center;gap:9px;font-size:12.5px;color:var(--ink-soft);font-weight:600;padding:5px 0}
  .c-row svg{width:14px;height:14px;color:var(--muted);flex:0 0 14px}
  .c-ask{margin-top:13px;width:100%;font-size:12px;font-weight:800;color:var(--forest);background:rgba(39,174,96,.1);border:1px solid var(--line);border-radius:10px;padding:9px;cursor:pointer;transition:.15s}
  .c-ask:hover{background:rgba(39,174,96,.18)}

  .agent-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(330px,1fr));gap:16px}
  .agent{background:var(--glass);border:1px solid var(--line-soft);border-radius:16px;padding:19px 20px;box-shadow:var(--shadow)}
  .a-top{display:flex;align-items:center;gap:13px;margin-bottom:14px}
  .a-ic{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;flex:0 0 44px;box-shadow:0 8px 20px rgba(0,0,0,.35)}
  .a-ic svg{width:22px;height:22px;color:#0A0D09}
  .a-name{font-size:15.5px;font-weight:800}.a-persona{font-size:11.5px;color:var(--forest);font-weight:700;margin-top:2px}
  .toggle{width:40px;height:23px;border-radius:20px;background:rgba(255,255,255,.12);position:relative;cursor:pointer;transition:.2s;flex:0 0 40px;margin-left:auto}
  .toggle::after{content:"";position:absolute;top:3px;left:3px;width:17px;height:17px;border-radius:50%;background:#fff;transition:.2s}
  .toggle.on{background:linear-gradient(135deg,var(--forest),var(--forest-2))}.toggle.on::after{left:20px}
  .a-meta{display:flex;align-items:center;gap:8px;font-size:11.5px;color:var(--ink-soft);font-weight:700;margin-bottom:13px;flex-wrap:wrap}
  .a-meta .sch{display:inline-flex;align-items:center;gap:6px;background:var(--surface);border:1px solid var(--line-soft);border-radius:20px;padding:4px 10px}
  .a-meta .sch svg{width:12px;height:12px;color:var(--leaf)}
  .a-meta .ran{color:var(--muted)}
  .a-out{background:var(--surface);border:1px solid var(--line-soft);border-radius:12px;padding:13px 15px;font-size:12.5px;line-height:1.55;color:var(--ink-soft);font-weight:500}
  .a-out .lbl{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin-bottom:7px;display:block}

  .flow-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:14px}
  .flow{display:flex;gap:13px;background:var(--glass);border:1px solid var(--line-soft);border-radius:14px;padding:16px 17px;box-shadow:var(--shadow)}
  .flow-ic{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex:0 0 38px}
  .flow-ic svg{width:18px;height:18px;color:#0A0D09}

   out:'3 low-crowd picks for this weekend, all under 20 min: Lindenwood Nature Preserve (quiet trails, great with the Merlin bird app), the Children Zoo at early entry Saturday, and Salomon Farm Park animal barn. All fit around Declan 1:30–4 nap.'},
  {name:'Money Check-in',persona:'Personal Financial Advisor',color:'#2E9E8A',on:true,sch:'Mondays · 8:00 AM',ran:'Jun 2, 8:00 AM',
   icon:'<path d="M12 1v22M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/>',
   out:'May recap: food spend landed ~$3,780 again — still your biggest lever. CC avalanche on track; next target is VentureOne. Set aside ~$4,300 for the Q2 estimated payment. Acorns transfers still paused — good call.'},
  {name:'Trips & Outings',persona:'Travel & Activity Advisor',color:'#27AE60',on:true,sch:'Wednesdays · weekly',ran:'Jun 3, 9:10 AM',
   icon:'<path d="M3 21h18M5 21V7l8-4v18M19 21V11l-6-3"/>',
   out:'The Children Museum of Indianapolis trip is still open — 2h10m drive, world largest. Best window looks like Jun 27–28. Want me to draft an itinerary and send Pierce & Taylor a heads-up so they can join?'},
  {name:'Dates & Birthdays',persona:'Family Keeper',color:'#9A6A3E',on:true,sch:'Daily · 7:00 AM',ran:'Today, 7:00 AM',
   icon:'<path d="M20 12v8H4v-8M2 7h20v5H2zM12 22V7M12 7a2.5 2.5 0 0 1 0-5C14 2 14 7 12 7z"/>',
   out:'Pierce birthday is in 5 days (Jun 9) and nothing is logged yet. Father Day is Jun 21. Want gift ideas for Pierce, or should I add a reminder to call him?'},
  {name:'Home Seasonal',persona:'Home Manager',color:'#6E4A2C',on:false,sch:'Monthly · 1st',ran:'May 1, 8:00 AM',
   icon:'<path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><path d="M9 22V12h6v10"/>',
   out:'Summer prep: HVAC filter is due (size in your manual is 16x25x1), deck staining before peak heat, and time to flip ceiling fans counter-clockwise. Currently paused — toggle on to resume.'},
];

const BOOKS=[
  {t:'Dog Man',a:'Dav Pilkey',c:'#D2A52C',ctx:'Currently reading. Loves the humor — great hook for reluctant moments.',on:true},
  {t:'The Bad Guys',a:'Aaron Blabey',c:'#9A6A3E',ctx:'Series he will binge. Good for building reading stamina.',on:true},
  {t:'Frog and Toad',a:'Arnold Lobel',c:'#2E9E8A',ctx:'Gentle, early-reader friendship stories. Calm bedtime pick.',on:false},
  {t:'Magic Tree House',a:'Mary Pope Osborne',c:'#27AE60',ctx:'Adventure + light history. A step up in length.',on:true},
  {t:'The Day the Crayons Quit',a:'Drew Daywalt',c:'#B98A3A',ctx:'Picture book — good for reading aloud with Declan too.',on:false},
];

const canvas=document.getElementById('canvas'),titleEl=document.getElementById('viewTitle'),subEl=document.getElementById('viewSub');
let activeFilters=new Set(Object.keys(COLORS));
const checkSVG='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg>';
const clockSVG='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>';
const pencilSVG='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4z"/></svg>';
const CADLABEL={daily:'Daily',weekly:'Weekly',monthly:'Monthly',quarterly:'Quarterly',annual:'Annual'};
function tint(hex,a){const n=parseInt(hex.slice(1),16);return 'rgba('+(n>>16&255)+','+(n>>8&255)+','+(n&255)+','+a+')';}

function taskRow(x){const pc={hi:'pri-hi',md:'pri-md',lo:'pri-lo'}[x.pri],pl={hi:'High',md:'Med',lo:'Low'}[x.pri],dc=x.due==='Today'?'style="color:var(--forest)"':'';
  return '<div class="task" onclick="this.classList.toggle(&quot;done&quot;)"><div class="check">'+checkSVG+'</div><div class="t-body"><div class="t-title">'+x.t+'</div><div class="t-meta"><span class="pill '+pc+'">'+pl+'</span><span class="tag">'+x.tag+'</span><span class="due" '+dc+'>'+clockSVG+x.due+'</span></div></div></div>';}
function routineRow(text,cad){return '<div class="task" onclick="this.classList.toggle(&quot;done&quot;)"><div class="check">'+checkSVG+'</div><div class="t-body"><div class="t-title">'+text+'</div><div class="t-meta"><span class="cad cad-'+cad+'">'+CADLABEL[cad]+'</span></div></div><div class="r-edit" onclick="event.stopPropagation()">'+pencilSVG+'</div></div>';}
function askBar(ph,scope){return '<div class="ask"><div class="ai"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 2l2.4 5.6L20 9l-4.5 4 1.3 6L12 16l-4.8 3 1.3-6L4 9l5.6-1.4z"/></svg></div><input placeholder="'+ph+'">'+(scope?'<span class="scope">'+scope+'</span>':'')+'<button class="send">Ask</button></div>';}
function agendaFor(cat){const o=[];Object.keys(events).forEach(k=>events[k].forEach(e=>{if(e.c===cat)o.push({day:k.split('-')[1],t:e.t,c:e.c})}));return o.slice(0,6);}

function calGrid(filterFn,compact){
  const start=new Date(2026,4,31);let cells='';const max=compact?2:3;
  for(let i=0;i<35;i++){const d=new Date(start);d.setDate(start.getDate()+i);const mo=d.getMonth(),day=d.getDate(),inJune=mo===5,key=(mo+1)+'-'+day,isToday=inJune&&day===4;
    const evs=(events[key]||[]).filter(filterFn);let h='';
    evs.slice(0,max).forEach(e=>{const col=COLORS[e.c];h+=e.soft?'<div class="ev soft"><span class="sdot" style="background:'+col+'"></span>'+e.t+'</div>':'<div class="ev" style="background:'+tint(col,.16)+';border-left-color:'+col+';color:'+col+'">'+e.t+'</div>';});
    if(evs.length>max)h+='<div class="more">+'+(evs.length-max)+' more</div>';
    cells+='<div class="cell '+(inJune?'':'out')+' '+(isToday?'today':'')+'"><span class="num">'+day+'</span>'+h+'</div>';}
  const wd=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  return '<div class="calendar'+(compact?' compact':'')+'"><div class="weekdays">'+wd.map(w=>'<div>'+w+'</div>').join('')+'</div><div class="grid">'+cells+'</div></div>';
}

function renderCalendar(){
  titleEl.textContent='Home';subEl.textContent='Everything the family has going on, in one place';
  const legend=Object.keys(COLORS).map(k=>'<div class="lg '+(activeFilters.has(k)?'':'off')+'" data-f="'+k+'"><span class="dot" style="background:'+COLORS[k]+'"></span>'+CATLABEL[k]+'</div>').join('');
  const feed=AGENTS.filter(a=>a.on).slice(0,3).map(a=>'<div class="fc"><div class="fc-top"><div class="fc-ic" style="background:'+a.color+'"><svg viewBox="0 0 24 24" fill="none" stroke="#0A0D09" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">'+a.icon+'</svg></div><div class="fc-name">'+a.name+'</div><div class="fc-time">'+a.ran.split(',')[0]+'</div></div><div class="fc-body">'+a.out+'</div></div>').join('');
  canvas.innerHTML='<div class="cal-head fade"><div class="mo">June 2026</div><div class="arrows"><button>‹</button><button>›</button></div><div class="legend">'+legend+'</div></div>'
    +'<div class="fade" style="animation-delay:.05s">'+calGrid(e=>activeFilters.has(e.c),false)+'</div>'
    +'<div class="feed fade" style="animation-delay:.1s"><div class="feed-h"><span class="sparkle"><svg viewBox="0 0 24 24" fill="none" stroke="#0A0D09" stroke-width="2" stroke-linecap="round"><path d="M12 2l2.4 5.6L20 9l-4.5 4 1.3 6L12 16l-4.8 3 1.3-6L4 9l5.6-1.4z"/></svg></span>From your agents this week</div><div class="feed-grid">'+feed+'</div></div>'
    +askBar('Ask anything across the whole family — “When’s our next free Saturday and what should we do?”','Home agent · all spaces + Drive');
  document.querySelectorAll('.lg').forEach(el=>el.onclick=()=>{const f=el.dataset.f;activeFilters.has(f)?activeFilters.delete(f):activeFilters.add(f);renderCalendar();});
}

function fileCard(f){return '<div class="file"><div class="ic" style="background:'+FT[f[1]]+'">'+f[1].toUpperCase()+'</div><div class="fn">'+f[0]+'</div><div class="fm">'+f[2]+'</div></div>';}
function tabBtn(id,label,icon,pip,active){return '<div class="tab '+(active?'active':'')+'" data-tab="'+id+'"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round">'+icon+'</svg>'+label+(pip?'<span class="pip">'+pip+'</span>':'')+'</div>';}
function contactCard(c){return '<div class="contact"><div class="c-top"><div class="c-av" style="background:'+c.color+'">'+c.name.split(' ').map(w=>w[0]).slice(0,2).join('')+'</div><div><div class="c-name">'+c.name+'</div><div class="c-role">'+c.role+'</div></div></div>'
  +'<div class="c-row"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M22 16.9v3a2 2 0 0 1-2.2 2 19.8 19.8 0 0 1-8.6-3 19.5 19.5 0 0 1-6-6 19.8 19.8 0 0 1-3-8.6A2 2 0 0 1 4.1 2h3a2 2 0 0 1 2 1.7c.1 1 .4 1.9.7 2.8a2 2 0 0 1-.5 2.1L8.1 9.9a16 16 0 0 0 6 6l1.3-1.3a2 2 0 0 1 2.1-.5c.9.3 1.8.6 2.8.7a2 2 0 0 1 1.7 2z"/></svg>'+c.phone+'</div>'
  +'<div class="c-row"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="M22 7l-10 6L2 7"/></svg>'+c.email+'</div>'
  +'<button class="c-ask">Ask Claude about '+c.name.split(' ')[0]+'</button></div>';}
function flowCard(f){const rem=f.type==='Reminder';const ic=rem?'<path d="M18 8a6 6 0 0 0-12 0c0 7-3 9-3 9h18s-3-2-3-9M13.7 21a2 2 0 0 1-3.4 0"/>':'<path d="M3 3v18h18M7 14l3-3 3 3 5-6"/>';
  return '<div class="flow"><div class="flow-ic" style="background:'+(rem?'var(--forest)':'var(--bark)')+'"><svg viewBox="0 0 24 24" fill="none" stroke="#0A0D09" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">'+ic+'</svg></div><div class="flow-body"><div class="flow-top"><span class="flow-name">'+f.name+'</span><span class="ftype '+(rem?'fr':'frep')+'">'+f.type+'</span></div><div class="flow-sch">'+f.sch+'</div><div class="flow-desc">'+f.desc+'</div></div><div class="toggle '+(f.on?'on':'')+'" onclick="this.classList.toggle(&quot;on&quot;)"></div></div>';}

function renderSpace(key){
  const s=spaces[key],col=COLORS[s.color],first=s.label.split(' ')[0];
  titleEl.textContent=s.label;subEl.textContent=s.role;

  // tabs: cadences + knowledge hub + flows + contacts
  let tabs=tabBtn('daily','Daily','<circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M2 12h2M20 12h2M5 5l1.5 1.5M17.5 17.5L19 19M19 5l-1.5 1.5M6.5 17.5L5 19"/>',s.routines.daily.length,true);
  tabs+=tabBtn('weekly','Weekly','<rect x="3" y="4" width="18" height="17" rx="2"/><path d="M3 9h18M8 2v4M16 2v4"/>',s.routines.weekly.length);
  tabs+=tabBtn('monthly','Monthly','<rect x="3" y="4" width="18" height="17" rx="2"/><path d="M3 9h18"/>',s.routines.monthly.length);
  tabs+=tabBtn('quarterly','Quarterly','<rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/>',s.routines.quarterly.length);
  tabs+=tabBtn('annual','Annual','<path d="M21 12a9 9 0 1 1-3-6.7M21 4v4h-4"/>',s.routines.annual.length);
  tabs+=tabBtn('kb','Knowledge Hub','<path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>',s.files.length);
  tabs+=tabBtn('flows','Flows','<path d="M12 2l2.4 5.6L20 9l-4.5 4 1.3 6L12 16l-4.8 3 1.3-6L4 9l5.6-1.4z"/>',s.flows.length);
  if(s.books)tabs+=tabBtn('books','Bookshelf','<path d="M4 4h6v16H4zM10 4h6v16h-6zM16 4l4 .5-2 15.5-4-.5"/>',BOOKS.length);
  if(s.contacts)tabs+=tabBtn('contacts','Contacts','<path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>',CONTACTS.filter(c=>c.space===key).length);

  function cadPanel(cad,active){const items=s.routines[cad]||[];
    return '<div class="tabpanel '+(active?'active':'')+'" data-panel="'+cad+'"><div class="panel"><h3>'+CADLABEL[cad]+' routines <span class="count">'+items.length+'</span></h3>'+(items.length?items.map(t=>routineRow(t,cad)).join(''):'<p style="color:var(--muted);font-size:13px">No '+cad+' routines yet.</p>')+'<div class="add-routine"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>Add a '+CADLABEL[cad].toLowerCase()+' routine</div></div></div>';}

  let panels=cadPanel('daily',true)+cadPanel('weekly')+cadPanel('monthly')+cadPanel('quarterly')+cadPanel('annual');

  // knowledge hub = files + scoped chat
  const chat=s.chat?s.chat.map(c=>'<div class="bubble user">'+c[0]+'</div><div class="bubble ai">'+c[1]+'<div class="cite"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/></svg>Grounded in: '+c[2]+'</div></div>').join(''):'';
  const kbPanel='<div class="tabpanel" data-panel="kb"><div class="kb-bar"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9"><path d="M3 7l3-4h12l3 4M3 7h18v12a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2zM3 7l4.5 8h9L21 7"/></svg><span class="crumb">Drive /</span> Hearth /<b>'+s.label+'</b><span style="margin-left:auto;color:var(--muted)">'+s.files.length+' files · synced</span></div>'
    +'<div class="kb-grid">'+s.files.map(fileCard).join('')+'<div class="file upload"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 16V4M6 10l6-6 6 6M4 20h16"/></svg><b>Upload</b><span>Adds to '+first+' knowledge</span></div></div>'
    +'<div class="panel" style="margin-top:18px"><h3>Ask '+first+' <span class="count" style="background:'+tint(col,.14)+';color:'+col+';border-color:'+tint(col,.3)+'">grounded in '+s.files.length+' docs</span></h3><div class="chat">'+chat+'</div>'+askBar('Ask about '+s.label.toLowerCase()+' — answers use only this space’s files…')+'</div></div>';
  panels+=kbPanel;

  // flows
  panels+='<div class="tabpanel" data-panel="flows"><div class="flow-grid">'+s.flows.map(flowCard).join('')+'</div><div class="add-routine"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>New flow — reminder or report</div><div class="kb-note bark" style="margin-top:14px"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 2l2.4 5.6L20 9l-4.5 4 1.3 6L12 16l-4.8 3 1.3-6L4 9l5.6-1.4z"/></svg><div>Flows are scoped AI runs for <b>'+first+'</b> — a reminder fires on a schedule; a report reads this space + Drive and writes a summary. Describe one in plain English and it’s set.</div></div></div>';

  if(s.books){const bk=BOOKS.map(b=>'<div class="book '+(b.on?'on':'')+'" onclick="this.classList.toggle(&quot;on&quot;)"><div class="cover" style="background:'+b.c+'"><div class="bt">'+b.t+'</div><div class="ba">'+b.a+'</div></div><div class="star"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2l3 7h7l-5.5 4 2 7L12 16l-6.5 4 2-7L2 9h7z"/></svg></div><div class="ctx">'+b.ctx+'</div></div>').join('');
    panels+='<div class="tabpanel" data-panel="books"><div class="books">'+bk+'</div><div class="kb-note"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 2l3 7h7l-5.5 4 2 7L12 16l-6.5 4 2-7L2 9h7z"/></svg><div>Tap a book to <b>include it in advice</b>. Reading and activity suggestions are shaped by what is selected here.</div></div></div>';}
  if(s.contacts){panels+='<div class="tabpanel" data-panel="contacts"><div class="contact-grid">'+CONTACTS.filter(c=>c.space===key).map(contactCard).join('')+'</div></div>';}

  canvas.innerHTML='<div class="banner fade"><div class="glow" style="background:'+col+'"></div><div class="big-av" style="background:'+col+'">'+s.initial+'</div><div><h2>'+s.label+'</h2><p>'+s.role+'</p></div><div class="bstats">'+s.stats.map(x=>'<div class="bstat"><div class="n" style="color:'+col+'">'+x[0]+'</div><div class="l">'+x[1]+'</div></div>').join('')+'</div></div>'
    +'<div class="space-sec fade" style="animation-delay:.04s"><div class="subhead"><span class="acc"></span>This month · '+s.label+'</div>'+calGrid(e=>e.c===key,true)+'</div>'
    +'<div class="space-sec fade" style="animation-delay:.07s"><div class="panel"><h3>Current to-do <span class="count">'+s.tasks.length+' open</span></h3>'+s.tasks.map(taskRow).join('')+'</div></div>'
    +'<div class="subhead fade" style="animation-delay:.09s"><span class="acc"></span>Routines & hub</div>'
    +'<div class="tabs fade" style="animation-delay:.1s">'+tabs+'</div><div class="fade" style="animation-delay:.12s">'+panels+'</div>';
  document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>{document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));document.querySelectorAll('.tabpanel').forEach(x=>x.classList.remove('active'));t.classList.add('active');document.querySelector('[data-panel="'+t.dataset.tab+'"]').classList.add('active');});
}

function agentsView(){
  titleEl.textContent='Agents';subEl.textContent='Scheduled advisors that run on their own and report back';
  const cards=AGENTS.map(a=>'<div class="agent"><div class="a-top"><div class="a-ic" style="background:'+a.color+'"><svg viewBox="0 0 24 24" fill="none" stroke="#0A0D09" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">'+a.icon+'</svg></div><div><div class="a-name">'+a.name+'</div><div class="a-persona">'+a.persona+'</div></div><div class="toggle '+(a.on?'on':'')+'" onclick="this.classList.toggle(&quot;on&quot;)"></div></div>'
    +'<div class="a-meta"><span class="sch">'+clockSVG+a.sch+'</span><span class="ran">Last run: '+a.ran+'</span></div>'
    +'<div class="a-out"><span class="lbl">Latest run</span>'+a.out+'</div></div>').join('');
  canvas.innerHTML='<div class="agent-grid fade">'+cards+'</div>'
    +'<div class="kb-note fade" style="animation-delay:.1s;max-width:760px"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 8v4l3 3M12 2a10 10 0 1 0 10 10"/></svg><div>These are household-wide agents. Each space also has its own <b>Flows</b> tab for scoped reminders and reports. Add your own — e.g. “every Sunday, plan next week’s meals from what is in the fridge.”</div></div>'
    +askBar('Describe a new agent — “Every Friday at 4, find 3 low-crowd kid activities for the weekend”','Creates a scheduled run');
}

function contactsView(){
  titleEl.textContent='Contacts';subEl.textContent='Every contractor, doctor, office & key person — ask about any of them';
  const groups=[...new Set(CONTACTS.map(c=>c.group))];
  let html='';groups.forEach(g=>{html+='<h3 style="font-size:13px;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);font-weight:800;margin:22px 0 13px">'+g+'</h3><div class="contact-grid">'+CONTACTS.filter(c=>c.group===g).map(contactCard).join('')+'</div>';});
  canvas.innerHTML='<div class="fade">'+html+'</div>'+askBar('“What’s Grove Brothers’ email?” or “When did we last see Dr. Rao?”','Home agent · all contacts');
}

function setActive(v){document.querySelectorAll('.nav-item,.sub-item').forEach(n=>n.classList.remove('active'));const el=document.querySelector('[data-view="'+v+'"]');if(el)el.classList.add('active');}
function go(v){setActive(v);try{canvas.scrollTo(0,0);}catch(e){}
  if(v==='calendar')renderCalendar();
  else if(spaces[v])renderSpace(v);
  else if(v==='agents')agentsView();
  else if(v==='contacts')contactsView();}
document.querySelectorAll('[data-view]').forEach(el=>el.addEventListener('click',()=>go(el.dataset.view)));
const ft=document.getElementById('familyToggle'),fm=document.getElementById('familyMenu');
ft.addEventListener('click',()=>{ft.classList.toggle('open');fm.classList.toggle('open')});
ft.classList.add('open');fm.classList.add('open');
renderCalendar();
</script>
</body>
</html>
